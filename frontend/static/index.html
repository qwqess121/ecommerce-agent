<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智能客服 · 电商客服智能体</title>
<style>
  :root {
    --bg: #f6f7fb;
    --sidebar-bg: #ffffff;
    --panel: #ffffff;
    --border: #e8eaf0;
    --text: #1f2430;
    --text-soft: #6b7280;
    --text-dim: #9aa1ad;
    --accent: #4f46e5;
    --accent-2: #7c3aed;
    --accent-soft: #eef0ff;
    --user-bubble: linear-gradient(135deg, #4f46e5, #7c3aed);
    --bot-bubble: #ffffff;
    --shadow: 0 1px 3px rgba(20, 23, 38, 0.06), 0 8px 24px rgba(20, 23, 38, 0.06);
    --radius: 16px;
    --green: #16a34a;
    --amber: #d97706;
    --red: #dc2626;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .app {
    display: grid;
    grid-template-columns: 290px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 18px 14px;
    gap: 14px;
  }
  .brand { display: flex; align-items: center; gap: 11px; padding: 4px 6px; }
  .brand .logo {
    width: 38px; height: 38px; border-radius: 11px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #fff; font-size: 20px;
    box-shadow: 0 6px 16px rgba(79, 70, 229, 0.35);
  }
  .brand .title { font-weight: 700; font-size: 16px; line-height: 1.2; }
  .brand .sub { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }

  .btn {
    border: 1px solid var(--border); background: #fff; color: var(--text);
    border-radius: 11px; padding: 10px 12px; font-size: 13.5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: all .15s ease; font-weight: 500;
  }
  .btn:hover { border-color: #c9cde0; background: #fafbff; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff; border: none; box-shadow: 0 6px 16px rgba(79, 70, 229, 0.28);
  }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-block { width: 100%; }
  .btn-sm { padding: 7px 10px; font-size: 12.5px; border-radius: 9px; }

  .sessions-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11.5px; color: var(--text-dim); padding: 2px 6px; margin-top: 4px;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .sessions { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 2px; }
  .session {
    display: flex; align-items: center; gap: 9px; padding: 9px 11px;
    border-radius: 11px; cursor: pointer; font-size: 13.5px; color: var(--text-soft);
    border: 1px solid transparent; transition: all .12s ease; position: relative;
  }
  .session:hover { background: #f4f5fa; }
  .session.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; border-color: #dfe1fb; }
  .session .ico { opacity: .7; }
  .session .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session .del {
    opacity: 0; color: var(--text-dim); font-size: 15px; line-height: 1; padding: 0 2px;
  }
  .session:hover .del { opacity: 1; }
  .session .del:hover { color: var(--red); }

  .kb-card {
    border: 1px solid var(--border); border-radius: 14px; padding: 13px;
    background: linear-gradient(180deg, #fbfbff, #f6f7fb);
  }
  .kb-card h4 { margin: 0 0 4px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .kb-stat { font-size: 12px; color: var(--text-soft); margin-bottom: 10px; }
  .kb-stat b { color: var(--accent); font-size: 14px; }
  .kb-actions { display: flex; gap: 8px; }
  #fileInput { display: none; }

  /* ---------- Main ---------- */
  .main { display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  .topbar {
    height: 60px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.85);
    backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px; flex-shrink: 0;
  }
  .topbar .left { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; }
  .topbar .badge {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
  }
  .topbar .badge.real { background: #dcfce7; color: var(--green); }

  .messages { flex: 1; overflow-y: auto; padding: 26px 0; }
  .messages-inner { max-width: 760px; margin: 0 auto; padding: 0 22px; display: flex; flex-direction: column; gap: 18px; }

  .welcome { text-align: center; padding: 60px 20px; color: var(--text-soft); }
  .welcome .big {
    width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #fff; font-size: 32px;
    box-shadow: 0 10px 26px rgba(79, 70, 229, 0.35);
  }
  .welcome h2 { margin: 0 0 8px; font-size: 21px; color: var(--text); }
  .welcome p { margin: 0; font-size: 13.5px; }
  .chips { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; margin-top: 22px; }
  .chip {
    border: 1px solid var(--border); background: #fff; border-radius: 999px;
    padding: 8px 15px; font-size: 13px; cursor: pointer; color: var(--text-soft);
    transition: all .15s ease;
  }
  .chip:hover { border-color: #c9cde0; color: var(--accent); background: var(--accent-soft); }

  .msg { display: flex; gap: 12px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    display: grid; place-items: center; font-size: 17px; color: #fff; font-weight: 600;
  }
  .avatar.bot { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .avatar.me { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
  .bubble {
    max-width: 78%; padding: 12px 15px; border-radius: 14px; font-size: 14.5px;
    line-height: 1.65; box-shadow: var(--shadow); word-break: break-word; white-space: pre-wrap;
  }
  .msg.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); color: #fff; border-top-right-radius: 4px; }

  .meta { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }
  .tag {
    font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 600;
    background: #eef1f6; color: var(--text-soft);
  }
  .tag.knowledge { background: #e0f2fe; color: #0369a1; }
  .tag.business { background: #ede9fe; color: #6d28d9; }
  .tag.chitchat { background: #dcfce7; color: #15803d; }
  .tag.human { background: #fef3c7; color: #b45309; }
  .tag.blocked { background: #fee2e2; color: #b91c1c; }

  .src-toggle {
    margin-top: 10px; font-size: 12.5px; color: var(--accent); cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px; user-select: none; font-weight: 600;
  }
  .src-toggle:hover { text-decoration: underline; }
  .sources { margin-top: 8px; display: none; flex-direction: column; gap: 8px; }
  .sources.open { display: flex; }
  .src {
    border: 1px solid var(--border); border-radius: 11px; padding: 10px 12px; background: #fafbff;
    font-size: 12.5px; color: var(--text-soft);
  }
  .src .src-name { font-weight: 700; color: var(--text); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
  .src .src-name .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .src .src-snip { line-height: 1.55; max-height: 88px; overflow: hidden; transition: max-height .2s; }
  .src.open .src-snip { max-height: 500px; }
  .src .more { color: var(--accent); cursor: pointer; font-size: 11.5px; margin-top: 3px; display: inline-block; }

  .handoff {
    margin-top: 9px; font-size: 12.5px; color: var(--amber);
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 8px 11px;
  }

  /* typing */
  .typing { display: flex; gap: 4px; padding: 4px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: #b9bed0; animation: blink 1.2s infinite both;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }

  /* ---------- Composer ---------- */
  .composer { padding: 14px 22px 20px; flex-shrink: 0; }
  .composer-inner { max-width: 760px; margin: 0 auto; position: relative; }
  .input-wrap {
    border: 1px solid var(--border); border-radius: 16px; background: #fff;
    box-shadow: var(--shadow); display: flex; align-items: flex-end; padding: 8px 8px 8px 16px; gap: 8px;
    transition: border-color .15s;
  }
  .input-wrap:focus-within { border-color: #c3c7ee; }
  textarea {
    flex: 1; border: none; outline: none; resize: none; font-family: inherit; font-size: 14.5px;
    line-height: 1.6; max-height: 160px; padding: 7px 0; background: transparent; color: var(--text);
  }
  .send {
    width: 40px; height: 40px; border-radius: 12px; border: none; cursor: pointer; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-size: 18px;
    display: grid; place-items: center; box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3); transition: filter .15s;
  }
  .send:hover { filter: brightness(1.06); }
  .send:disabled { opacity: .5; cursor: default; }
  .hint { text-align: center; font-size: 11.5px; color: var(--text-dim); margin-top: 9px; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #d4d7e2; border-radius: 9px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: #b9bed0; background-clip: content-box; }

  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ---------- Connection banner ---------- */
  .conn-banner {
    display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: #fef2f2; color: #b91c1c; border-bottom: 1px solid #fecaca;
    font-size: 13px; padding: 10px 18px; text-align: center; line-height: 1.55;
    box-shadow: 0 2px 8px rgba(185,28,28,.08);
  }
  .conn-banner b { color: #991b1b; }
  .conn-banner code { background: #fff; border: 1px solid #fecaca; border-radius: 6px; padding: 1px 6px; font-size: 12.5px; }
  .conn-banner .x { float: right; cursor: pointer; opacity: .6; font-weight: 700; }
  .conn-banner .x:hover { opacity: 1; }
</style>
</head>
<body>
<div class="conn-banner" id="connBanner">
  <span class="x" onclick="this.parentNode.style.display='none'">×</span>
  ⚠️ <b>无法连接到后端服务</b>：本页面与后端不在同一地址下。请确认后端已启动，并通过后端地址打开本页面（例如 <code>http://127.0.0.1:8000/ui/</code>），不要通过文件预览/独立标签页打开。
</div>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">💬</div>
      <div>
        <div class="title">智能客服</div>
        <div class="sub">电商客服智能体 · RAG + Agent</div>
      </div>
    </div>

    <button class="btn btn-primary btn-block" id="newChat">＋ 新建对话</button>

    <div class="sessions-head"><span>历史对话</span><span id="sessCount"></span></div>
    <div class="sessions" id="sessions"></div>

    <div class="kb-card">
      <h4>📚 知识库</h4>
      <div class="kb-stat" id="kbStat">加载中…</div>
      <div class="kb-actions">
        <button class="btn btn-sm" id="uploadBtn">上传文件</button>
        <button class="btn btn-sm" id="rebuildBtn">重建索引</button>
      </div>
      <input type="file" id="fileInput" accept=".json,.jsonl,.txt,.md,.csv" />
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="left">
        <span id="convTitle">新对话</span>
        <span class="badge" id="modeBadge">…</span>
      </div>
      <button class="btn btn-sm" id="clearBtn">🗑 清空对话</button>
    </div>

    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner">
        <div class="welcome" id="welcome">
          <div class="big">🤖</div>
          <h2>你好，我是你的电商智能客服</h2>
          <p>我可以回答商品、订单、退换货、物流等问题，也能帮你查询订单与物流。试试下面的问题：</p>
          <div class="chips">
            <div class="chip">如何申请退货？</div>
            <div class="chip">查询订单 123456</div>
            <div class="chip">运费怎么算</div>
            <div class="chip">怎么开发票</div>
            <div class="chip">转人工</div>
          </div>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <div class="input-wrap">
          <textarea id="input" rows="1" placeholder="输入你的问题，Enter 发送，Shift+Enter 换行…"></textarea>
          <button class="send" id="send">➤</button>
        </div>
        <div class="hint">由 RAG + 多智能体驱动 · 回答仅供参考，涉及账户与资金请以官方为准</div>
      </div>
    </div>
  </main>
</div>

<script>
const $ = (s) => document.querySelector(s);
const api = (p) => location.origin + p;

function showConnBanner() {
  const b = document.getElementById('connBanner');
  if (b) b.style.display = 'block';
}

let sessions = [];           // {id, title, messages:[]}
let currentId = null;

/* ---------- session persistence ---------- */
function load() {
  try { sessions = JSON.parse(localStorage.getItem('cs_sessions') || '[]'); } catch { sessions = []; }
  currentId = localStorage.getItem('cs_current') || null;
  if (!sessions.length) { createSession(); }
  else if (!sessions.find(s => s.id === currentId)) currentId = sessions[0].id;
}
function save() {
  localStorage.setItem('cs_sessions', JSON.stringify(sessions));
  localStorage.setItem('cs_current', currentId);
}
function createSession() {
  const s = { id: 's_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6), title: '新对话', messages: [] };
  sessions.unshift(s); currentId = s.id; save(); renderSessions(); renderMessages();
  return s;
}
function cur() { return sessions.find(s => s.id === currentId) || createSession(); }

/* ---------- rendering ---------- */
function renderSessions() {
  const box = $('#sessions'); box.innerHTML = '';
  sessions.forEach(s => {
    const el = document.createElement('div');
    el.className = 'session' + (s.id === currentId ? ' active' : '');
    el.innerHTML = `<span class="ico">💬</span><span class="label"></span><span class="del" title="删除">×</span>`;
    el.querySelector('.label').textContent = s.title || '新对话';
    el.onclick = (e) => { if (e.target.classList.contains('del')) return; currentId = s.id; save(); renderSessions(); renderMessages(); };
    el.querySelector('.del').onclick = (e) => {
      e.stopPropagation();
      sessions = sessions.filter(x => x.id !== s.id);
      if (!sessions.length) createSession(); else if (currentId === s.id) currentId = sessions[0].id;
      save(); renderSessions(); renderMessages();
    };
    box.appendChild(el);
  });
  $('#sessCount').textContent = sessions.length;
}

function esc(t){ return (t||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderMessages() {
  const s = cur();
  const inner = $('#messagesInner');
  $('#convTitle').textContent = s.title || '新对话';
  if (!s.messages.length) {
    inner.innerHTML = `
      <div class="welcome">
        <div class="big">🤖</div>
        <h2>你好，我是你的电商智能客服</h2>
        <p>我可以回答商品、订单、退换货、物流等问题，也能帮你查询订单与物流。试试下面的问题：</p>
        <div class="chips">
          <div class="chip">如何申请退货？</div>
          <div class="chip">查询订单 123456</div>
          <div class="chip">运费怎么算</div>
          <div class="chip">怎么开发票</div>
          <div class="chip">转人工</div>
        </div>
      </div>`;
    bindChips();
    return;
  }
  inner.innerHTML = '';
  s.messages.forEach(m => inner.appendChild(m.role === 'user' ? userEl(m.text) : botEl(m)));
  scrollBottom();
}

function userEl(text) {
  const d = document.createElement('div'); d.className = 'msg user';
  d.innerHTML = `<div class="avatar me">你</div><div class="bubble"></div>`;
  d.querySelector('.bubble').textContent = text;
  return d;
}
function botEl(m) {
  const d = document.createElement('div'); d.className = 'msg bot';
  let html = `<div class="avatar bot">AI</div><div><div class="bubble"></div>`;
  // meta tags
  const intent = m.intent || '';
  if (intent) html += `<div class="meta"><span class="tag ${intent}">意图 · ${intent}</span></div>`;
  // sources
  if (m.sources && m.sources.length) {
    html += `<div class="src-toggle" onclick="toggleSources(this)">📎 参考来源（${m.sources.length}）</div><div class="sources">`;
    m.sources.forEach(s => {
      const snip = (s.snippet || s.text || '').slice(0, 240);
      html += `<div class="src"><div class="src-name"><span class="dot"></span>${esc(s.source || '知识库')}</div>
        <div class="src-snip">${esc(snip)}</div>
        ${snip.length >= 240 ? '<span class="more" onclick="toggleSnip(this)">展开 ▾</span>' : ''}</div>`;
    });
    html += `</div>`;
  }
  if (m.transfer) html += `<div class="handoff">⚠️ 已为你转接人工客服，请稍候。</div>`;
  html += `</div>`;
  d.innerHTML = html;
  d.querySelector('.bubble').textContent = m.text;
  return d;
}

function toggleSources(el) { el.nextElementSibling.classList.toggle('open'); }
function toggleSnip(el) {
  const snip = el.previousElementSibling;
  const open = snip.parentElement.classList.toggle('open');
  el.textContent = open ? '收起 ▴' : '展开 ▾';
}
function bindChips() {
  document.querySelectorAll('.chip').forEach(c => c.onclick = () => { $('#input').value = c.textContent; send(); });
}
function scrollBottom() { const m = $('#messages'); m.scrollTop = m.scrollHeight; }

/* ---------- chat ---------- */
function setTyping(on) {
  const inner = $('#messagesInner');
  let t = $('#typing');
  if (on && !t) {
    const d = document.createElement('div'); d.className = 'msg bot'; d.id = 'typing';
    d.innerHTML = `<div class="avatar bot">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    inner.appendChild(d); scrollBottom();
  } else if (!on && t) t.remove();
}

async function send() {
  const input = $('#input');
  const text = input.value.trim();
  if (!text) return;
  const s = cur();
  if (s.messages.length === 0) { s.title = text.slice(0, 16); }
  s.messages.push({ role: 'user', text });
  input.value = ''; input.style.height = 'auto';
  renderSessions(); renderMessages();
  $('#welcome') && ($('#welcome').style.display = 'none');
  setTyping(true);

  const sendBtn = $('#send'); sendBtn.disabled = true;
  try {
    const res = await fetch(api('/chat'), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: s.id, message: text })
    });
    const data = await res.json();
    s.messages.push({
      role: 'assistant', text: data.answer || '', intent: data.intent,
      sources: data.sources || [], transfer: data.transfer || false
    });
  } catch (e) {
    showConnBanner();
    s.messages.push({ role: 'assistant', text: '⚠️ 调用后端失败：' + e.message + '（请确认后端已启动，并通过其地址打开本页面）' });
  } finally {
    setTyping(false); sendBtn.disabled = false; save(); renderMessages();
  }
}

/* ---------- kb ---------- */
async function refreshStats() {
  try {
    const r = await fetch(api('/kb_stats')); const d = await r.json();
    $('#kbStat').innerHTML = `已索引 <b>${d.chunks ?? d.documents ?? '-'}</b> 个知识块 · ${d.vector_enabled ? '向量检索已启用' : '仅关键词'}`;
  } catch { $('#kbStat').textContent = '知识库状态获取失败'; }
}
async function rebuild() {
  const btn = $('#rebuildBtn'); btn.disabled = true; const old = btn.textContent;
  btn.textContent = '重建中…';
  try { await fetch(api('/rebuild'), { method: 'POST' }); await refreshStats(); }
  catch (e) { alert('重建失败：' + e.message); }
  finally { btn.disabled = false; btn.textContent = old; }
}
async function uploadFile(file) {
  const fd = new FormData(); fd.append('file', file);
  try {
    const r = await fetch(api('/ingest'), { method: 'POST', body: fd });
    if (r.ok) { await refreshStats(); alert('上传并建立索引完成'); }
    else alert('上传失败：' + (await r.text()));
  } catch (e) { alert('上传失败：' + e.message); }
}

/* ---------- mode badge ---------- */
async function refreshMode() {
  try {
    const r = await fetch(api('/health')); const d = await r.json();
    const b = $('#modeBadge');
    if (d.mock) { b.textContent = '演示模式 (Mock)'; b.classList.remove('real'); }
    else { b.textContent = '真实大模型'; b.classList.add('real'); }
  } catch { showConnBanner(); }
}

/* ---------- events ---------- */
$('#send').onclick = send;
$('#newChat').onclick = () => { createSession(); $('#input').focus(); };
$('#clearBtn').onclick = async () => {
  const s = cur(); s.messages = []; save(); renderMessages();
  try { await fetch(api('/reset'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: s.id }) }); } catch {}
};
$('#rebuildBtn').onclick = rebuild;
$('#uploadBtn').onclick = () => $('#fileInput').click();
$('#fileInput').onchange = (e) => { if (e.target.files[0]) uploadFile(e.target.files[0]); e.target.value = ''; };

const input = $('#input');
input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 160) + 'px'; });
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

/* ---------- init ---------- */
load(); renderSessions(); renderMessages(); refreshStats(); refreshMode();
</script>
</body>
</html>
